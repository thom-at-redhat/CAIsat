---
# .pre-commit-config.yaml
#
# Generated by assemble.sh on 2026-06-29T15:22:05Z
# Attributes: base python javascript markdown yaml shell security github container
#
# https://pre-commit.com/hooks.html
repos:
  # Base hooks (include in every project)
  - repo: https://github.com/pre-commit/pre-commit-hooks.git
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # v6.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-merge-conflict
      - id: check-yaml
        language_version: python3
        args: ["--allow-multiple-documents"]
        exclude: ^chart/
      - id: debug-statements
        language_version: python3
      - id: end-of-file-fixer
        language_version: python3
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: no-commit-to-branch
        args: ["--branch", "master", "--branch", "main"]
      - id: trailing-whitespace
        language_version: python3
      - id: requirements-txt-fixer
        language_version: python3

  # Python — ruff (lint + format; replaces black, flake8, reorder-python-imports)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 4924b0e01e032fea073ad04a1c5cfa7e4add0afb # v0.15.6
    hooks:
      - id: ruff
        args: [--fix]
        language_version: python3
      - id: ruff-format
        language_version: python3

  - repo: https://github.com/asottile/pyupgrade
    rev: 75992aaa40730136014f34227e0135f63fc951b4 # v3.21.2
    hooks:
      - id: pyupgrade
        args: ["--py311-plus"]
        language_version: python3

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: f40886d54c729f533f864ed6ce584e920feb0af7 # v1.15.0
    hooks:
      - id: mypy
        additional_dependencies: [types-Pillow==10.2.0.20240822, pytest==9.0.3]
        args: [--config-file=pyproject.toml]
        files: ^(scripts|tests)/

  # JavaScript — JSHint (ESLint 9 flat config not yet set up for CRA)
  - repo: https://github.com/pre-commit/mirrors-jshint
    rev: 882622d2d13597740358203e9f2e2ae5976cd149 # v2.13.6
    hooks:
      - id: jshint
        files: \.(js)$
        types: [file]
        exclude: ^frontend/|\.backup$
        additional_dependencies:
          - jshint@2.13.6

  # Code Formatting — Prettier
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: f12edd9c7be1c20cfa42420fd0e6df71e42b51ea # v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(js|jsx|ts|tsx|json|css|scss|md|yaml|yml)$
        types: [file]
        args: [--print-width=200]
        exclude: ^chart/|^frontend/|package-lock\.json|\.backup$
        additional_dependencies:
          - prettier@3.1.0

  # Markdown — markdownlint-cli (Node.js variant; line-length 200 via .markdownlint.json)
  - repo: https://github.com/igorshubovych/markdownlint-cli.git
    rev: e72a3ca1632f0b11a07d171449fe447a7ff6795e # v0.48.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.json]
        exclude: ^README\.md$|^chart/README\.md$|pull_request_template\.md$

  # Markdown — link checking (relative links only; config via .markdown-link-check.json)
  - repo: local
    hooks:
      - id: markdown-link-check
        name: Check Markdown links
        entry: markdown-link-check --config .markdown-link-check.json --quiet
        language: node
        additional_dependencies: ["markdown-link-check@3.14.2"]
        require_serial: true
        types: [markdown]

  # Spell checking
  - repo: https://github.com/codespell-project/codespell
    rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a # v2.4.2
    hooks:
      - id: codespell
        args: ["--skip=*.ipynb,.secrets.baseline,**/package-lock.json,*.backup", "--ignore-words-list=DOTA,intoto"]

  # YAML (line-length 200 via .yamllint.yml)
  - repo: https://github.com/adrienverge/yamllint.git
    rev: cba56bcde1fdd01c1deb3f945e69764c291a6530 # v1.38.0
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yml]
        exclude: ^chart/

  # Shell — shellcheck (shellcheck-py for finer control)
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: 745eface02aef23e168a8afb6b5737818efbea95 # v0.11.0.1
    hooks:
      - id: shellcheck
        args: ["--severity=warning"]

  # Secret detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: 01886c8a910c64595c47f186ca1ffc0b77fa5458 # v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  # Trojan Source / dangerous Unicode detection
  - repo: local
    hooks:
      - id: trojan-source
        name: Detect Trojan Source (dangerous Unicode)
        entry: >-
          bash -c 'f=0; for file in "$@"; do
          if grep -Pq "[\x{202A}-\x{202E}\x{2066}-\x{2069}\x{200B}-\x{200D}\x{FEFF}\x{2060}]" "$file" 2>/dev/null; then
          echo "$file: dangerous Unicode (BIDI/zero-width)"; f=1; fi; done; exit $f' --
        language: system
        types: [text]

  # Commit message format (conventional commits — opt-in)
  # - repo: https://github.com/compilerla/conventional-pre-commit
  #   rev: v4.4.0
  #   hooks:
  #     - id: conventional-pre-commit
  #       stages: [commit-msg]
  #       args: [feat, fix, docs, style, refactor, test, chore, ci, build, perf, revert]

  # GitHub Actions — actionlint
  - repo: https://github.com/rhysd/actionlint
    rev: 393031adb9afb225ee52ae2ccd7a5af5525e03e8 # v1.7.11
    hooks:
      - id: actionlint

  # GitHub Actions — ensure SHA-pinned action references
  - repo: local
    hooks:
      - id: check-workflows-use-hashes
        name: Check GitHub Actions use SHA-pinned actions
        entry: >-
          bash -c 'f=0; for file in "$@"; do
          if grep -Pn "uses:\s+[^#]+@(?!([a-f0-9]{40}|v\d))" "$file" 2>/dev/null; then
          echo "$file: found action reference not pinned to SHA or version tag"; f=1; fi; done; exit $f' --
        language: system
        files: ^\.github/workflows/.*\.ya?ml$
        types: [file]

  - repo: local
    hooks:
      - id: check-no-cluster-info
        name: Check for private cluster info and personal identifiers
        entry: bash scripts/check-no-cluster-info.sh
        language: system
        pass_filenames: true
        types: [text]

  # OpenSSF Scorecard — full-repo local scan (read-only; no publish)
  - repo: local
    hooks:
      - id: scorecard
        name: OpenSSF Scorecard (full repo)
        entry: bash scripts/scorecard-pre-commit.sh
        language: system
        pass_filenames: false
        always_run: true
        require_serial: true

  # Kubernetes manifests — kube-linter (optional local hook; Phase 21)
  - repo: local
    hooks:
      - id: hadolint-containerfiles
        name: Lint Dockerfiles
        entry: bash scripts/hadolint-pre-commit.sh
        language: system
        files: (Containerfile|Dockerfile)
        pass_filenames: true
      - id: kube-linter-chart
        name: kube-linter (chart templates)
        entry: bash scripts/kube-linter-pre-commit.sh
        language: system
        files: ^chart/templates/.*\.yaml$
        exclude: ^chart/templates/.*pipeline.*\.yaml$
        pass_filenames: true
