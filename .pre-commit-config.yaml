---
# .pre-commit-config.yaml
#
# Generated by assemble.sh on 2026-06-29T15:22:05Z
# Attributes: base python javascript markdown yaml shell security github container
#
# https://pre-commit.com/hooks.html
repos:
  # Base hooks (include in every project)
  - repo: https://github.com/pre-commit/pre-commit-hooks.git
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-merge-conflict
      - id: check-yaml
        language_version: python3
        args: ["--allow-multiple-documents"]
        exclude: ^chart/
      - id: debug-statements
        language_version: python3
      - id: end-of-file-fixer
        language_version: python3
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: no-commit-to-branch
        args: ["--branch", "master", "--branch", "main"]
      - id: trailing-whitespace
        language_version: python3
      - id: requirements-txt-fixer
        language_version: python3

  # Python — ruff (lint + format; replaces black, flake8, reorder-python-imports)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [--fix]
        language_version: python3
      - id: ruff-format
        language_version: python3

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: ["--py311-plus"]
        language_version: python3

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies: [types-Pillow==10.2.0.20240822, pytest]
        args: [--config-file=pyproject.toml]
        files: ^(scripts|tests)/

  # JavaScript — JSHint (ESLint 9 flat config not yet set up for CRA)
  - repo: https://github.com/pre-commit/mirrors-jshint
    rev: v2.13.6
    hooks:
      - id: jshint
        files: \.(js)$
        types: [file]
        exclude: ^frontend/|\.backup$
        additional_dependencies:
          - jshint@^2.13.6

  # Code Formatting — Prettier
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(js|jsx|ts|tsx|json|css|scss|md|yaml|yml)$
        types: [file]
        args: [--print-width=200]
        exclude: ^chart/|^frontend/|package-lock\.json|\.backup$
        additional_dependencies:
          - prettier@^3.1.0

  # Markdown — markdownlint-cli (Node.js variant; line-length 200 via .markdownlint.json)
  - repo: https://github.com/igorshubovych/markdownlint-cli.git
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.json]
        exclude: ^README\.md$|^chart/README\.md$|pull_request_template\.md$

  # Markdown — link checking (relative links only; config via .markdown-link-check.json)
  - repo: local
    hooks:
      - id: markdown-link-check
        name: Check Markdown links
        entry: markdown-link-check --config .markdown-link-check.json --quiet
        language: node
        additional_dependencies: ["markdown-link-check@3.14.2"]
        require_serial: true
        types: [markdown]

  # Spell checking
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args: ["--skip=*.ipynb,.secrets.baseline,**/package-lock.json,*.backup", "--ignore-words-list=DOTA"]

  # YAML (line-length 200 via .yamllint.yml)
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yml]
        exclude: ^chart/

  # Shell — shellcheck (shellcheck-py for finer control)
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: ["--severity=warning"]

  # Secret detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  # Trojan Source / dangerous Unicode detection
  - repo: local
    hooks:
      - id: trojan-source
        name: Detect Trojan Source (dangerous Unicode)
        entry: >-
          bash -c 'f=0; for file in "$@"; do
          if grep -Pq "[\x{202A}-\x{202E}\x{2066}-\x{2069}\x{200B}-\x{200D}\x{FEFF}\x{2060}]" "$file" 2>/dev/null; then
          echo "$file: dangerous Unicode (BIDI/zero-width)"; f=1; fi; done; exit $f' --
        language: system
        types: [text]

  # Commit message format (conventional commits — opt-in)
  # - repo: https://github.com/compilerla/conventional-pre-commit
  #   rev: v4.4.0
  #   hooks:
  #     - id: conventional-pre-commit
  #       stages: [commit-msg]
  #       args: [feat, fix, docs, style, refactor, test, chore, ci, build, perf, revert]

  # GitHub Actions — actionlint
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.11
    hooks:
      - id: actionlint

  # GitHub Actions — ensure SHA-pinned action references
  - repo: local
    hooks:
      - id: check-workflows-use-hashes
        name: Check GitHub Actions use SHA-pinned actions
        entry: >-
          bash -c 'f=0; for file in "$@"; do
          if grep -Pn "uses:\s+[^#]+@(?!([a-f0-9]{40}|v\d))" "$file" 2>/dev/null; then
          echo "$file: found action reference not pinned to SHA or version tag"; f=1; fi; done; exit $f' --
        language: system
        files: ^\.github/workflows/.*\.ya?ml$
        types: [file]

  - repo: local
    hooks:
      - id: check-no-cluster-info
        name: Check for private cluster info and personal identifiers
        entry: bash scripts/check-no-cluster-info.sh
        language: system
        pass_filenames: true
        types: [text]

  # Containerfile / Dockerfile — hadolint
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker
        files: (Containerfile|Dockerfile)
        args: [--ignore, DL3006, --ignore, DL3016, --ignore, DL3041, --ignore, DL3059]
...
