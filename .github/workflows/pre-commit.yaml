# Pre-commit, Helm template, and smoke validation on PR and main push.
# Assisted by: cursor, claude
---
name: pre-commit

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pre-commit-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.osv.dev:443
            files.pythonhosted.org:443
            get.helm.sh:443
            ghcr.io:443
            github.com:443
            oss-fuzz-build-logs.storage.googleapis.com:443
            pkg-containers.githubusercontent.com:443
            pypi.org:443
            results-receiver.actions.githubusercontent.com:443
            *.blob.core.windows.net:443
            *.githubapp.com:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache pre-commit
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Install pre-commit
        run: pip install --require-hashes -r .github/requirements-pre-commit.txt

      - name: Run pre-commit
        run: SKIP=no-commit-to-branch pre-commit run --all-files

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.16.4

      - name: Helm template test
        run: helm template test ./chart

      - name: Cache smoke venvs
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            backend/.venv-smoke
            backend-detection/.venv-smoke
          key: smoke-venv-${{ runner.os }}-py3.12-${{ hashFiles('backend/requirements.txt', 'backend-detection/requirements.txt') }}
          restore-keys: |
            smoke-venv-${{ runner.os }}-py3.12-

      - name: Smoke (health profile)
        run: make smoke

  smoke-binary:
    name: smoke-binary
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            files.pythonhosted.org:443
            github.com:443
            pypi.org:443
            results-receiver.actions.githubusercontent.com:443
            *.blob.core.windows.net:443
            *.githubapp.com:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache smoke venvs
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            backend/.venv-smoke
            backend-detection/.venv-smoke
          key: smoke-venv-${{ runner.os }}-py3.12-${{ hashFiles('backend/requirements.txt', 'backend-detection/requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            smoke-venv-${{ runner.os }}-py3.12-

      - name: Pytest (kserve + capabilities)
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: make test

      - name: Smoke (binary profile)
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: SMOKE_SKIP_HEALTH=1 SMOKE_PROFILE=binary make smoke
