# Pre-commit, Helm template, and smoke validation on PR and main push.
# Assisted by: cursor, claude
---
name: pre-commit

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pre-commit-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Detect chart changes
        id: chart-filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        with:
          filters: |
            chart:
              - 'chart/**'

      - name: Chart path filter result
        run: echo "chart=${{ steps.chart-filter.outputs.chart }}"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache pre-commit
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Install pre-commit
        run: pip install pre-commit==4.6.0

      - name: Run pre-commit
        run: SKIP=no-commit-to-branch pre-commit run --all-files

      - name: Install Helm
        if: github.event_name == 'workflow_dispatch' || steps.chart-filter.outputs.chart == 'true'
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.16.4

      - name: Helm template test
        if: github.event_name == 'workflow_dispatch' || steps.chart-filter.outputs.chart == 'true'
        run: helm template test ./chart

      - name: Smoke (health profile)
        run: make smoke

  smoke-binary:
    name: smoke-binary
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Detect smoke-relevant changes
        id: smoke-filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        with:
          filters: |
            smoke:
              - 'backend/**'
              - 'backend-detection/**'
              - 'scripts/smoke-local.sh'
              - 'Makefile'
              - '.github/workflows/**'

      - name: Smoke path filter result
        run: echo "smoke=${{ steps.smoke-filter.outputs.smoke }}"

      - name: Set up Python
        if: github.event_name == 'workflow_dispatch' || steps.smoke-filter.outputs.smoke == 'true'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Smoke (binary profile)
        if: github.event_name == 'workflow_dispatch' || steps.smoke-filter.outputs.smoke == 'true'
        run: SMOKE_PROFILE=binary make smoke
