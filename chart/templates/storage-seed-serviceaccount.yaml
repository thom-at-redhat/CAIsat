{{- if .Values.seaweedfs.seed.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "caisat.fullname" . }}-storage-seed
  labels:
    {{- include "caisat.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage-seed

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "caisat.fullname" . }}-storage-seed-view
  labels:
    {{- include "caisat.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage-seed
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
- kind: ServiceAccount
  name: {{ include "caisat.fullname" . }}-storage-seed
  namespace: {{ .Release.Namespace }}
{{- end }}
