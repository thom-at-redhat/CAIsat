{{- if include "caisat.gpuExclusiveEnabled" . }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "caisat.fullname" . }}-gpu-orchestrator
  labels:
    {{- include "caisat.labels" . | nindent 4 }}
    app.kubernetes.io/component: gpu-orchestrator

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "caisat.fullname" . }}-gpu-orchestrator
  labels:
    {{- include "caisat.labels" . | nindent 4 }}
    app.kubernetes.io/component: gpu-orchestrator
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "patch", "update"]
    resourceNames:
      - {{ .Values.model.name }}-predictor
      - {{ .Values.detection.name }}-predictor
      - {{ .Values.sentinel2Model.name }}-predictor

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "caisat.fullname" . }}-gpu-orchestrator
  labels:
    {{- include "caisat.labels" . | nindent 4 }}
    app.kubernetes.io/component: gpu-orchestrator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "caisat.fullname" . }}-gpu-orchestrator
subjects:
  - kind: ServiceAccount
    name: {{ include "caisat.fullname" . }}-gpu-orchestrator
    namespace: {{ .Release.Namespace }}
{{- end }}
