{{- if .Values.s4.enabled }}
---
# PersistentVolumeClaim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "caisat.fullname" . }}-s4-storage
  labels:
    {{- include "caisat.labels" . | nindent 4 }}
    app.kubernetes.io/component: s4
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.s4.storage.size }}
  {{- if .Values.s4.storage.storageClassName }}
  storageClassName: {{ .Values.s4.storage.storageClassName }}
  {{- end }}

---
# ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "caisat.fullname" . }}-s4-config
  labels:
    {{- include "caisat.labels" . | nindent 4 }}
    app.kubernetes.io/component: s4
data:
  AWS_DEFAULT_REGION: {{ .Values.s4.config.awsRegion }}
  AWS_S3_ENDPOINT: {{ .Values.s4.config.s3Endpoint }}
  IP: {{ .Values.s4.config.ip }}
  JWT_EXPIRATION_HOURS: {{ .Values.s4.config.jwtExpirationHours | quote }}
  LOCAL_STORAGE_PATHS: {{ .Values.s4.config.localStoragePaths | quote }}
  MAX_CONCURRENT_TRANSFERS: {{ .Values.s4.config.maxConcurrentTransfers | quote }}
  MAX_FILE_SIZE_GB: {{ .Values.s4.config.maxFileSizeGb | quote }}
  PORT: {{ .Values.s4.config.port | quote }}

---
# Secret
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "caisat.fullname" . }}-s4-credentials
  labels:
    {{- include "caisat.labels" . | nindent 4 }}
    app.kubernetes.io/component: s4
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: {{ .Values.s4.credentials.accessKey }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.s4.credentials.secretKey }}

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "caisat.fullname" . }}-s4
  labels:
    {{- include "caisat.labels" . | nindent 4 }}
    app.kubernetes.io/component: s4
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "caisat.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: s4
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "caisat.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: s4
        app: caisat
        component: s4
    spec:
      containers:
      - name: s4
        image: "{{ .Values.s4.image.repository }}:{{ .Values.s4.image.tag }}"
        imagePullPolicy: {{ .Values.s4.image.pullPolicy }}
        ports:
        - containerPort: 7480
          name: s3-api
          protocol: TCP
        - containerPort: 5000
          name: web-ui
          protocol: TCP
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "caisat.fullname" . }}-s4-credentials
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "caisat.fullname" . }}-s4-credentials
              key: AWS_SECRET_ACCESS_KEY
        envFrom:
        - configMapRef:
            name: {{ include "caisat.fullname" . }}-s4-config
        volumeMounts:
        - name: storage
          mountPath: /var/lib/ceph/radosgw
        resources:
          {{- toYaml .Values.s4.resources | nindent 12 }}
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: {{ include "caisat.fullname" . }}-s4-storage

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "caisat.fullname" . }}-s4
  labels:
    {{- include "caisat.labels" . | nindent 4 }}
    app.kubernetes.io/component: s4
spec:
  type: ClusterIP
  ports:
  - port: 7480
    targetPort: 7480
    protocol: TCP
    name: s3-api
  - port: 5000
    targetPort: 5000
    protocol: TCP
    name: web-ui
  selector:
    {{- include "caisat.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: s4
    app: caisat
    component: s4

---
# Route
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "caisat.fullname" . }}-s4-ui
  labels:
    {{- include "caisat.labels" . | nindent 4 }}
    app.kubernetes.io/component: s4
spec:
  to:
    kind: Service
    name: {{ include "caisat.fullname" . }}-s4
    weight: 100
  port:
    targetPort: web-ui
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
{{- end }}
