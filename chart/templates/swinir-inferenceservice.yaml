apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  annotations:
    modelFormat: onnx
    security.opendatahub.io/enable-auth: 'false'
    openshift.io/description: ''
    openshift.io/display-name: swinir
    serving.kserve.io/deploymentMode: Standard
    opendatahub.io/connections: swinir
    opendatahub.io/model-type: predictive
  name: swinir
  finalizers:
    - inferenceservice.finalizers
    - odh.inferenceservice.finalizers
  labels:
    opendatahub.io/dashboard: 'true'
spec:
  predictor:
    automountServiceAccountToken: false
    deploymentStrategy:
      type: RollingUpdate
    maxReplicas: 1
    minReplicas: {{ .Values.model.minReplicas }}
    {{- include "caisat.gpuTolerations" . | nindent 4 }}
    model:
      modelFormat:
        name: onnx
        version: '1'
      name: ''
      resources:
        {{- include "caisat.swinirModelResources" . | nindent 8 }}
      runtime: {{ include "caisat.swinirRuntimeName" . }}
      storageUri: 'oci://{{ .Values.model.image.repository }}:{{ .Values.model.image.tag }}'
    timeout: 300
---
kind: Secret
apiVersion: v1
metadata:
  name: swinir
  labels:
    opendatahub.io/dashboard: 'true'
  annotations:
    opendatahub.io/connection-type-protocol: uri
    opendatahub.io/connection-type-ref: uri-v1
    openshift.io/display-name: swinir
stringData:
  URI: oci://{{ .Values.model.image.repository }}:{{ .Values.model.image.tag }}
type: Opaque
---
{{- if not (include "caisat.swinirUseTritonGpu" .) }}
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  annotations:
    opendatahub.io/apiProtocol: REST
    opendatahub.io/runtime-version: 1.7.1
    opendatahub.io/serving-runtime-scope: global
    opendatahub.io/template-display-name: MLServer ServingRuntime for KServe
    opendatahub.io/template-name: mlserver-runtime-template
    openshift.io/display-name: MLServer ServingRuntime for KServe
    serving.kserve.io/server-type: mlserver
  name: swinir-model
  labels:
    opendatahub.io/dashboard: 'true'
spec:
  annotations:
    monitoring.opendatahub.io/scrape: 'true'
    opendatahub.io/kserve-runtime: mlserver
    prometheus.io/path: /metrics
    prometheus.io/port: '8082'
  containers:
    - env:
        - name: MLSERVER_MODEL_IMPLEMENTATION
          value: '{{ "{{" }}.Labels.modelClass{{ "}}" }}'
        - name: MLSERVER_HTTP_PORT
          value: '8080'
        - name: MLSERVER_MODELS_DIR
          value: /mnt/models
      image: 'registry.redhat.io/rhoai/odh-mlserver-rhel9@sha256:d76bea18afe7b361847babb7a8ebc51fdbcd8164435f1bcb971e1701ba1bc595'
      livenessProbe:
        failureThreshold: 10
        httpGet:
          path: '/v2/models/{{ "{{" }}.Name{{ "}}" }}/ready'
          port: 8080
        initialDelaySeconds: 60
        periodSeconds: 30
        timeoutSeconds: 30
      name: kserve-container
      ports:
        - containerPort: 8080
          protocol: TCP
      readinessProbe:
        failureThreshold: 6
        httpGet:
          path: '/v2/models/{{ "{{" }}.Name{{ "}}" }}/ready'
          port: 8080
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 30
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        privileged: false
        runAsNonRoot: true
      startupProbe:
        exec:
          command:
            - /bin/sh
            - '-c'
            - |
              [ -n "$(ls -A /mnt/models 2>/dev/null)" ]
        failureThreshold: 1
        initialDelaySeconds: 1
        periodSeconds: 1
  multiModel: false
  protocolVersions:
    - v2
  supportedModelFormats:
    - name: sklearn
      version: '0'
    - name: sklearn
      version: '1'
    - name: xgboost
      version: '1'
    - name: xgboost
      version: '2'
    - name: lightgbm
      version: '3'
    - name: lightgbm
      version: '4'
    - name: onnx
      version: '1'
{{- end }}
---
{{- if (include "caisat.swinirUseTritonGpu" .) }}
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  annotations:
    opendatahub.io/apiProtocol: REST
    opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
    opendatahub.io/serving-runtime-scope: global
    openshift.io/display-name: Triton GPU ServingRuntime for SwinIR
    serving.kserve.io/server-type: triton
  name: swinir-triton
  labels:
    opendatahub.io/dashboard: 'true'
spec:
  annotations:
    prometheus.kserve.io/path: /metrics
    prometheus.kserve.io/port: '8002'
  volumes:
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 2Gi
    - name: triton-models
      emptyDir: {}
  containers:
    - name: kserve-container
      image: {{ (.Values.model.triton.image | default "nvcr.io/nvidia/tritonserver:24.05-py3") | quote }}
      command:
        - /bin/sh
        - '-c'
      args:
        - |
          set -e
          mkdir -p /triton-models/{{ .Values.model.name }}/1
          cp /mnt/models/model.onnx /triton-models/{{ .Values.model.name }}/1/model.onnx
          exec tritonserver \
            --model-store=/triton-models \
            --http-port=8080 \
            --grpc-port=9000 \
            --allow-http=true \
            --allow-grpc=true \
            --strict-model-config=false
      ports:
        - containerPort: 8080
          protocol: TCP
      volumeMounts:
        - name: shm
          mountPath: /dev/shm
        - name: triton-models
          mountPath: /triton-models
      livenessProbe:
        failureThreshold: 6
        httpGet:
          path: /v2/health/live
          port: 8080
        initialDelaySeconds: 30
        periodSeconds: 30
        timeoutSeconds: 10
      readinessProbe:
        failureThreshold: 6
        httpGet:
          path: '/v2/models/{{ .Values.model.name }}/ready'
          port: 8080
        initialDelaySeconds: 15
        periodSeconds: 10
        timeoutSeconds: 10
  multiModel: false
  protocolVersions:
    - v2
    - grpc-v2
  supportedModelFormats:
    - name: onnx
      version: '1'
      autoSelect: true
    - name: triton
      version: '2'
      autoSelect: true
{{- end }}
