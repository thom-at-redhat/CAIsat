# SeaweedFS S3-compatible object storage (weed server mode).
# Assisted by: cursor, claude
{{- if .Values.seaweedfs.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "caisat.fullname" . }}-seaweedfs-storage
  labels:
    {{- include "caisat.labels" . | nindent 4 }}
    app.kubernetes.io/component: seaweedfs
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.seaweedfs.storage.size }}
  {{- if .Values.seaweedfs.storage.storageClassName }}
  storageClassName: {{ .Values.seaweedfs.storage.storageClassName }}
  {{- end }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "caisat.fullname" . }}-seaweedfs-config
  labels:
    {{- include "caisat.labels" . | nindent 4 }}
    app.kubernetes.io/component: seaweedfs
data:
  AWS_DEFAULT_REGION: {{ .Values.seaweedfs.config.awsRegion }}
  S3_ENDPOINT: http://{{ include "caisat.fullname" . }}-seaweedfs.{{ .Release.Namespace }}.svc.cluster.local:7480
  s3.json: |
    {
      "identities": [
        {
          "name": "caisat",
          "credentials": [
            {
              "accessKey": {{ .Values.seaweedfs.credentials.accessKey | quote }},
              "secretKey": {{ .Values.seaweedfs.credentials.secretKey | quote }}
            }
          ],
          "actions": ["Admin", "Read", "Write", "List", "Tagging"]
        }
      ]
    }

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "caisat.fullname" . }}-seaweedfs-credentials
  labels:
    {{- include "caisat.labels" . | nindent 4 }}
    app.kubernetes.io/component: seaweedfs
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: {{ .Values.seaweedfs.credentials.accessKey }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.seaweedfs.credentials.secretKey }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "caisat.fullname" . }}-seaweedfs
  labels:
    {{- include "caisat.labels" . | nindent 4 }}
    app.kubernetes.io/component: seaweedfs
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "caisat.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: seaweedfs
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "caisat.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: seaweedfs
        app: caisat
        component: seaweedfs
    spec:
      containers:
      - name: seaweedfs
        image: "{{ .Values.seaweedfs.image.repository }}:{{ .Values.seaweedfs.image.tag }}"
        imagePullPolicy: {{ .Values.seaweedfs.image.pullPolicy }}
        args:
          - server
          - -dir=/data
          - -ip=0.0.0.0
          - -s3
          - -s3.port=7480
          - -s3.config=/etc/seaweedfs/s3.json
        ports:
        - containerPort: 7480
          name: s3-api
          protocol: TCP
        envFrom:
        - configMapRef:
            name: {{ include "caisat.fullname" . }}-seaweedfs-config
        volumeMounts:
        - name: storage
          mountPath: /data
        - name: s3-config
          mountPath: /etc/seaweedfs
          readOnly: true
        resources:
          {{- toYaml .Values.seaweedfs.resources | nindent 12 }}
        livenessProbe:
          tcpSocket:
            port: 7480
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 7480
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: {{ include "caisat.fullname" . }}-seaweedfs-storage
      - name: s3-config
        configMap:
          name: {{ include "caisat.fullname" . }}-seaweedfs-config
          items:
          - key: s3.json
            path: s3.json

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "caisat.fullname" . }}-seaweedfs
  labels:
    {{- include "caisat.labels" . | nindent 4 }}
    app.kubernetes.io/component: seaweedfs
spec:
  type: ClusterIP
  ports:
  - port: 7480
    targetPort: 7480
    protocol: TCP
    name: s3-api
  selector:
    {{- include "caisat.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: seaweedfs
    app: caisat
    component: seaweedfs
{{- end }}
