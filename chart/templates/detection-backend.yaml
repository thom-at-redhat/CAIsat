---
# Detection Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "caisat.fullname" . }}-detection-backend
  labels:
    {{- include "caisat.labels" . | nindent 4 }}
    app.kubernetes.io/component: detection-backend
spec:
  replicas: {{ .Values.detectionBackend.replicaCount }}
  selector:
    matchLabels:
      {{- include "caisat.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: detection-backend
  template:
    metadata:
      labels:
        {{- include "caisat.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: detection-backend
    spec:
      {{- if include "caisat.gpuExclusiveEnabled" . }}
      serviceAccountName: {{ include "caisat.fullname" . }}-gpu-orchestrator
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: detection-backend
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.detectionBackend.image.repository }}:{{ .Values.detectionBackend.image.tag }}"
        imagePullPolicy: {{ .Values.detectionBackend.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: MODEL_ENDPOINT
          value: "http://{{ .Values.detection.serviceName }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.detection.port }}/v2/models/{{ .Values.detection.name }}/infer"
        - name: CONFIDENCE_THRESHOLD
          value: "{{ .Values.detectionBackend.env.confidenceThreshold }}"
        - name: IOU_THRESHOLD
          value: "{{ .Values.detectionBackend.env.iouThreshold }}"
        - name: COMPUTE_PROFILE
          value: {{ .Values.computeProfile.name | quote }}
        - name: GPU_AVAILABLE
          value: {{ .Values.computeProfile.gpuAvailable | quote }}
        - name: INFERENCE_ACCELERATOR
          value: {{ include "caisat.inferenceAccelerator" . | quote }}
        - name: KSERVE_PREFER_BINARY
          value: {{ .Values.kserve.preferBinary | quote }}
        {{- if include "caisat.gpuExclusiveEnabled" . }}
        - name: GPU_EXCLUSIVE_MODE
          value: "true"
        - name: PREDICTOR_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: SWINIR_DEPLOYMENT
          value: {{ printf "%s-predictor" .Values.model.name | quote }}
        - name: YOLO_DEPLOYMENT
          value: {{ printf "%s-predictor" .Values.detection.name | quote }}
        - name: SENTINEL2_DEPLOYMENT
          value: {{ printf "%s-predictor" .Values.sentinel2Model.name | quote }}
        - name: SWINIR_MODEL_NAME
          value: {{ .Values.model.name | quote }}
        - name: YOLO_MODEL_NAME
          value: {{ .Values.detection.name | quote }}
        - name: PREDICTOR_PORT
          value: {{ .Values.detection.port | quote }}
        - name: PREDICTOR_READY_TIMEOUT_SECONDS
          value: {{ .Values.computeProfile.predictorReadyTimeoutSeconds | default 300 | quote }}
        {{- end }}
        - name: SAHI_WINDOW
          value: "640"
        - name: SAHI_OVERLAP
          value: "0.2"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          {{- toYaml .Values.detectionBackend.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

---
# Detection Backend Service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "caisat.fullname" . }}-detection-backend
  labels:
    {{- include "caisat.labels" . | nindent 4 }}
    app.kubernetes.io/component: detection-backend
spec:
  type: {{ .Values.detectionBackend.service.type }}
  ports:
  - port: {{ .Values.detectionBackend.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "caisat.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: detection-backend

---
# Detection Backend Route
{{- if .Values.detectionBackend.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "caisat.fullname" . }}-detection-backend
  labels:
    {{- include "caisat.labels" . | nindent 4 }}
    app.kubernetes.io/component: detection-backend
  annotations:
    haproxy.router.openshift.io/timeout: 5m
spec:
  host: {{ .Values.detectionBackend.route.host }}
  to:
    kind: Service
    name: {{ include "caisat.fullname" . }}-detection-backend
    weight: 100
  port:
    targetPort: http
  {{- if .Values.detectionBackend.route.tls.enabled }}
  tls:
    termination: {{ .Values.detectionBackend.route.tls.termination }}
    insecureEdgeTerminationPolicy: {{ .Values.detectionBackend.route.tls.insecureEdgeTerminationPolicy | default "Redirect" }}
  {{- end }}
  wildcardPolicy: None
{{- end }}
