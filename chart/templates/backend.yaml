---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "caisat.fullname" . }}-backend
  labels:
    {{- include "caisat.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "caisat.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "caisat.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
        app: caisat
        component: backend
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: backend
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: MODEL_ENDPOINT
          value: {{ include "caisat.modelEndpoint" . | quote }}
        - name: COMPUTE_PROFILE
          value: {{ .Values.computeProfile.name | quote }}
        - name: GPU_AVAILABLE
          value: {{ .Values.computeProfile.gpuAvailable | quote }}
        - name: INFERENCE_ACCELERATOR
          value: {{ include "caisat.inferenceAccelerator" . | quote }}
        - name: KSERVE_PREFER_BINARY
          value: {{ .Values.kserve.preferBinary | quote }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          {{- toYaml .Values.backend.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "caisat.fullname" . }}-backend
  labels:
    {{- include "caisat.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
  - port: {{ .Values.backend.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "caisat.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
    app: caisat
    component: backend

---
# Backend Route
{{- if .Values.backend.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "caisat.fullname" . }}-backend
  labels:
    {{- include "caisat.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  annotations:
    haproxy.router.openshift.io/timeout: 5m
spec:
  host: {{ .Values.backend.route.host }}
  to:
    kind: Service
    name: {{ include "caisat.fullname" . }}-backend
    weight: 100
  port:
    targetPort: http
  {{- if .Values.backend.route.tls.enabled }}
  tls:
    termination: {{ .Values.backend.route.tls.termination }}
    insecureEdgeTerminationPolicy: {{ .Values.backend.route.tls.insecureEdgeTerminationPolicy | default "Redirect" }}
  {{- end }}
  wildcardPolicy: None
{{- end }}
