{{- if .Values.backendChangedetection.enabled }}
---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "caisat.fullname" . }}-backend-changedetection
  labels:
    {{- include "caisat.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend-changedetection
spec:
  replicas: {{ .Values.backendChangedetection.replicaCount }}
  selector:
    matchLabels:
      {{- include "caisat.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend-changedetection
  template:
    metadata:
      labels:
        {{- include "caisat.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend-changedetection
        app: caisat
        component: backend-changedetection
    spec:
      containers:
      - name: backend
        image: "{{ .Values.backendChangedetection.image.repository }}:{{ .Values.backendChangedetection.image.tag }}"
        imagePullPolicy: {{ .Values.backendChangedetection.image.pullPolicy }}
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: S3_ENDPOINT
          value: "http://{{ include "caisat.fullname" . }}-s4.{{ .Release.Namespace }}.svc.cluster.local:7480"
        - name: S3_BUCKET
          value: {{ .Values.backendChangedetection.s3Bucket }}
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "caisat.fullname" . }}-s4-credentials
              key: AWS_ACCESS_KEY_ID
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "caisat.fullname" . }}-s4-credentials
              key: AWS_SECRET_ACCESS_KEY
        resources:
          {{- toYaml .Values.backendChangedetection.resources | nindent 12 }}
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "caisat.fullname" . }}-backend-changedetection
  labels:
    {{- include "caisat.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend-changedetection
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    {{- include "caisat.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend-changedetection
    app: caisat
    component: backend-changedetection

---
# Route
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "caisat.fullname" . }}-backend-changedetection
  labels:
    {{- include "caisat.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend-changedetection
spec:
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  to:
    kind: Service
    name: {{ include "caisat.fullname" . }}-backend-changedetection
    weight: 100
  wildcardPolicy: None
{{- end }}
