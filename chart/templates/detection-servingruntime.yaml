{{- if .Values.detection.deploy }}
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: {{ .Values.detection.name }}
  labels:
    {{- include "zoom-enhance.labels" . | nindent 4 }}
    opendatahub.io/dashboard: "true"
  annotations:
    opendatahub.io/apiProtocol: REST
    opendatahub.io/runtime-version: 1.7.1
    opendatahub.io/serving-runtime-scope: global
    opendatahub.io/template-display-name: MLServer ServingRuntime for KServe
    opendatahub.io/template-name: mlserver-runtime-template
    openshift.io/display-name: MLServer ServingRuntime for KServe
    serving.kserve.io/server-type: mlserver
spec:
  annotations:
    monitoring.opendatahub.io/scrape: "true"
    opendatahub.io/kserve-runtime: mlserver
    prometheus.io/path: /metrics
    prometheus.io/port: "8082"
  containers:
    - env:
        - name: MLSERVER_MODEL_IMPLEMENTATION
          value: '{{ "{{" }}.Labels.modelClass{{ "}}" }}'
        - name: MLSERVER_HTTP_PORT
          value: "8080"
        - name: MLSERVER_MODELS_DIR
          value: /mnt/models
      image: registry.redhat.io/rhoai/odh-mlserver-rhel9@sha256:d76bea18afe7b361847babb7a8ebc51fdbcd8164435f1bcb971e1701ba1bc595
      livenessProbe:
        failureThreshold: 6
        httpGet:
          path: '/v2/models/{{ "{{" }}.Name{{ "}}" }}/ready'
          port: 8080
        initialDelaySeconds: 20
        periodSeconds: 10
        timeoutSeconds: 5
      name: kserve-container
      ports:
        - containerPort: 8080
          protocol: TCP
      readinessProbe:
        failureThreshold: 3
        httpGet:
          path: '/v2/models/{{ "{{" }}.Name{{ "}}" }}/ready'
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 5
        timeoutSeconds: 5
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        privileged: false
        runAsNonRoot: true
      startupProbe:
        exec:
          command:
            - /bin/sh
            - "-c"
            - |
              [ -n "$(ls -A /mnt/models 2>/dev/null)" ]
        failureThreshold: 1
        initialDelaySeconds: 1
        periodSeconds: 1
  multiModel: false
  protocolVersions:
    - v2
  supportedModelFormats:
    - name: sklearn
      version: "0"
    - name: sklearn
      version: "1"
    - name: xgboost
      version: "1"
    - name: xgboost
      version: "2"
    - name: lightgbm
      version: "3"
    - name: lightgbm
      version: "4"
    - name: onnx
      version: "1"
{{- end }}
