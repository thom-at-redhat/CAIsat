{{- if .Values.backend.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "zoom-enhance.fullname" . }}-backend
  labels:
    {{- include "zoom-enhance.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  annotations:
    haproxy.router.openshift.io/timeout: 5m
spec:
  host: {{ .Values.backend.route.host }}
  to:
    kind: Service
    name: {{ include "zoom-enhance.fullname" . }}-backend
    weight: 100
  port:
    targetPort: http
  {{- if .Values.backend.route.tls.enabled }}
  tls:
    termination: {{ .Values.backend.route.tls.termination }}
    insecureEdgeTerminationPolicy: {{ .Values.backend.route.tls.insecureEdgeTerminationPolicy | default "Redirect" }}
  {{- end }}
  wildcardPolicy: None
{{- end }}
