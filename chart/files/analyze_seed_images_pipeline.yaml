          \ dict\n):\n    \"\"\"Aggregate all location stats into areas.json.\"\"\"\
          \n    import boto3\n    import json\n    from datetime import datetime\n\
          \n    s3 = boto3.client(\n        's3',\n        endpoint_url=s3_endpoint,\n\
