          \      'classification': overall,\n        'timeSeries': results\n    }\n\
          \n    # Write stats to S3\n    stats_key = f\"metadata/{location_name}-stats.json\"\
          \n    print(f\"\\nWriting statistics to S3...\")\n    print(f\"  Key: {stats_key}\"\
          )\n    print(f\"  Size: {len(json.dumps(stats, indent=2))} bytes\")\n\n\
