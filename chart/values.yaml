# Default values for caisat
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Compute profile: cpu | t4 | l40s | hopper
# Backends read COMPUTE_PROFILE; GPU tiers require GPU_AVAILABLE=true on cluster.
computeProfile:
  name: cpu
  gpuAvailable: false

# KServe v2 infer protocol: false avoids MLServer binary bug on RHOAI 3.4.0 (JSON fallback).
kserve:
  preferBinary: false

networkPolicy:
  enabled: false

# Model configuration
model:
  # Deploy the model as part of this chart
  deploy: true

  # OCI image with the ONNX model
  image:
    repository: quay.io/thom_at_redhat/caisat
    tag: "model"

  # InferenceService name
  name: swinir

  # Service name of the model inference endpoint (auto-generated: <name>-predictor)
  serviceName: swinir-predictor

  # Namespace where the model is deployed
  # Leave empty ("") to use the same namespace as the Helm release
  namespace: ""

  # Port (MLServer default is 8080)
  port: 8080

  # Model runtime
  runtime: mlserver

  # Resources for the model server
  resources:
    requests:
      cpu: "4"
      memory: "6Gi"
    limits:
      cpu: "4"
      memory: "8Gi"

# Sentinel2 SatlasPretrain Model configuration
sentinel2Model:
  # Deploy the Sentinel2 model as part of this chart
  deploy: true

  # OCI image with the ONNX model
  image:
    repository: quay.io/thom_at_redhat/caisat
    tag: "sentinel2"

  # InferenceService name
  name: sentinel2-model

  # Connection name (for the secret)
  connectionName: sentinel2

  # Service name of the model inference endpoint (auto-generated: <name>-predictor)
  serviceName: sentinel2-model-predictor

  # Namespace where the model is deployed
  # Leave empty ("") to use the same namespace as the Helm release
  namespace: ""

  # Port (MLServer default is 8080)
  port: 8080

  # Model runtime
  runtime: mlserver

  # Resources for the model server
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "3"
      memory: "4Gi"

# YOLO Object Detection Model configuration
detection:
  # Deploy the detection model as part of this chart
  deploy: true

  # OCI image with the ONNX model
  image:
    repository: quay.io/thom_at_redhat/caisat
    tag: "yoloobb"

  # InferenceService name
  name: yolov8m-satelite

  # Connection name (for the secret)
  connectionName: yolo-satellite

  # Service name of the model inference endpoint (auto-generated: <name>-predictor)
  serviceName: yolov8m-satelite-predictor

  # Namespace where the model is deployed
  # Leave empty ("") to use the same namespace as the Helm release
  namespace: ""

  # Port (MLServer default is 8080)
  port: 8080

  # Model runtime
  runtime: mlserver

  # Resources for the model server
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "6Gi"

# Backend configuration
backend:
  replicaCount: 1

  image:
    repository: quay.io/thom_at_redhat/caisat
    pullPolicy: Always
    tag: "backend"

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  service:
    type: ClusterIP
    port: 8080

  route:
    enabled: true
    host: ""  # Leave empty for auto-generated
    tls:
      enabled: true
      termination: edge

# Detection Backend configuration
detectionBackend:
  replicaCount: 1

  image:
    repository: quay.io/thom_at_redhat/caisat
    pullPolicy: Always
    tag: "detection-backend"

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

  service:
    type: ClusterIP
    port: 8080

  route:
    enabled: true
    host: ""  # Leave empty for auto-generated
    tls:
      enabled: true
      termination: edge

  # Environment variables
  env:
    confidenceThreshold: "0.5"
    iouThreshold: "0.45"

# Frontend configuration
frontend:
  replicaCount: 1

  image:
    repository: quay.io/thom_at_redhat/caisat
    pullPolicy: Always
    tag: "frontend"

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  service:
    type: ClusterIP
    port: 8080

  route:
    enabled: true
    host: ""  # Leave empty for auto-generated
    tls:
      enabled: true
      termination: edge

# Image pull secrets — quay.io/thom_at_redhat/caisat is private (robot credentials)
# The secret must exist in the target namespace before helm install.
# Create once per namespace:
#   oc create secret docker-registry quay-pull-secret \
#     --docker-server=quay.io \
#     --docker-username=<robot-name> \
#     --docker-password=<robot-token> \
#     -n <namespace>
#   oc secrets link default quay-pull-secret --for=pull -n <namespace>
imagePullSecrets:
  - name: quay-pull-secret

# Pod annotations
podAnnotations: {}

# Pod security context - empty to use OpenShift's assigned UID
podSecurityContext: {}

# Security context - empty to use OpenShift's assigned UID
securityContext: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# SeaweedFS S3-compatible object storage (weed server mode; port 7480).
seaweedfs:
  enabled: true

  image:
    # Public OCI image — pin tag; mirror to Quay if cluster lacks docker.io access.
    repository: docker.io/chrislusf/seaweedfs
    tag: "4.36"
    pullPolicy: IfNotPresent

  storage:
    size: 10Gi
    storageClassName: gp3-csi

  config:
    awsRegion: us-east-1

  credentials:
    accessKey: caisat-access-key
    secretKey: caisat-secret-key-change-in-production  # pragma: allowlist secret

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

  seed:
    enabled: true
    bucketName: satellite-images
    # DS notebook ImageStreams require RHOAI workbenches component; openshift/python works on lean clusters (psi-21 verified 2026-07-01).
    image: image-registry.openshift-image-registry.svc:5000/openshift/python:3.12-ubi9
    waitImage: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "2Gi"
        cpu: "1000m"

# Backend Change Detection configuration
backendChangedetection:
  enabled: true
  replicaCount: 1

  image:
    repository: quay.io/thom_at_redhat/caisat
    pullPolicy: Always
    tag: "backend-changedetection"

  s3Bucket: satellite-images

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Data Science Pipelines configuration
pipelines:
  enabled: true
  name: dspa

  apiServer:
    enableOauth: true
    cacheEnabled: true
    artifactSignedURLExpirySeconds: 60

  database:
    pipelineDBName: mlpipeline
    pvcSize: 10Gi
    username: mlpipeline

  persistenceAgent:
    numWorkers: 2

  podToPodTLS: true

  scheduledWorkflow:
    cronScheduleTimezone: UTC

  # Run analysis pipeline automatically after install
  runAnalysis: true

  analysis:
    # Match seed.image; substituted into analyze_seed_images_pipeline.yaml via pipeline-configmap placeholder.
    image: image-registry.openshift-image-registry.svc:5000/openshift/python:3.12-ubi9
    waitImage: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest
