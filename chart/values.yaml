# Default values for caisat
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Compute profile: cpu | t4 | l40s | hopper
# Backends read COMPUTE_PROFILE; GPU tiers require GPU_AVAILABLE=true on cluster.
computeProfile:
  name: cpu
  gpuAvailable: false

networkPolicy:
  enabled: false

# Model configuration
model:
  # Deploy the model as part of this chart
  deploy: true

  # OCI image with the ONNX model
  image:
    repository: quay.io/thom_at_redhat/caisat
    tag: "model"

  # InferenceService name
  name: swinir

  # Service name of the model inference endpoint (auto-generated: <name>-predictor)
  serviceName: swinir-predictor

  # Namespace where the model is deployed
  # Leave empty ("") to use the same namespace as the Helm release
  namespace: ""

  # Port (MLServer default is 8080)
  port: 8080

  # Model runtime
  runtime: mlserver

  # Resources for the model server
  resources:
    requests:
      cpu: "4"
      memory: "6Gi"
    limits:
      cpu: "4"
      memory: "8Gi"

# Sentinel2 SatlasPretrain Model configuration
sentinel2Model:
  # Deploy the Sentinel2 model as part of this chart
  deploy: true

  # OCI image with the ONNX model
  image:
    repository: quay.io/thom_at_redhat/caisat
    tag: "sentinel2"

  # InferenceService name
  name: sentinel2-model

  # Connection name (for the secret)
  connectionName: sentinel2

  # Service name of the model inference endpoint (auto-generated: <name>-predictor)
  serviceName: sentinel2-model-predictor

  # Namespace where the model is deployed
  # Leave empty ("") to use the same namespace as the Helm release
  namespace: ""

  # Port (MLServer default is 8080)
  port: 8080

  # Model runtime
  runtime: mlserver

  # Resources for the model server
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "3"
      memory: "4Gi"

# YOLO Object Detection Model configuration
detection:
  # Deploy the detection model as part of this chart
  deploy: true

  # OCI image with the ONNX model
  image:
    repository: quay.io/thom_at_redhat/caisat
    tag: "yoloobb"

  # InferenceService name
  name: yolov8m-satelite

  # Connection name (for the secret)
  connectionName: yolo-satellite

  # Service name of the model inference endpoint (auto-generated: <name>-predictor)
  serviceName: yolov8m-satelite-predictor

  # Namespace where the model is deployed
  # Leave empty ("") to use the same namespace as the Helm release
  namespace: ""

  # Port (MLServer default is 8080)
  port: 8080

  # Model runtime
  runtime: mlserver

  # Resources for the model server
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "6Gi"

# Backend configuration
backend:
  replicaCount: 1

  image:
    repository: quay.io/thom_at_redhat/caisat
    pullPolicy: Always
    tag: "backend"

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  service:
    type: ClusterIP
    port: 8080

  route:
    enabled: true
    host: ""  # Leave empty for auto-generated
    tls:
      enabled: true
      termination: edge

# Detection Backend configuration
detectionBackend:
  replicaCount: 1

  image:
    repository: quay.io/thom_at_redhat/caisat
    pullPolicy: Always
    tag: "detection-backend"

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

  service:
    type: ClusterIP
    port: 8080

  route:
    enabled: true
    host: ""  # Leave empty for auto-generated
    tls:
      enabled: true
      termination: edge

  # Environment variables
  env:
    confidenceThreshold: "0.5"
    iouThreshold: "0.45"

# Frontend configuration
frontend:
  replicaCount: 1

  image:
    repository: quay.io/thom_at_redhat/caisat
    pullPolicy: Always
    tag: "frontend"

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  service:
    type: ClusterIP
    port: 8080

  route:
    enabled: true
    host: ""  # Leave empty for auto-generated
    tls:
      enabled: true
      termination: edge

# Image pull secrets — not required for fork defaults (public quay.io/thom_at_redhat/caisat)
imagePullSecrets: []
# - name: quay-pull-secret  # only if overriding to a private registry

# Pod annotations
podAnnotations: {}

# Pod security context - empty to use OpenShift's assigned UID
podSecurityContext: {}

# Security context - empty to use OpenShift's assigned UID
securityContext: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# S4 Storage configuration
s4:
  enabled: true

  image:
    repository: quay.io/rh-aiservices-bu/s4
    tag: latest
    pullPolicy: Always

  storage:
    size: 10Gi
    storageClassName: gp3-csi

  config:
    awsRegion: us-east-1
    s3Endpoint: http://localhost:7480
    ip: 0.0.0.0
    jwtExpirationHours: "8"
    localStoragePaths: ""
    maxConcurrentTransfers: "2"
    maxFileSizeGb: "20"
    port: "5000"

  credentials:
    accessKey: caisat-access-key
    secretKey: caisat-secret-key-change-in-production  # pragma: allowlist secret

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

  seed:
    enabled: true
    bucketName: satellite-images
    image: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/s2i-generic-data-science-notebook:2024.1
    waitImage: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "2Gi"
        cpu: "1000m"

# Backend Change Detection configuration
backendChangedetection:
  enabled: true
  replicaCount: 1

  image:
    repository: quay.io/thom_at_redhat/caisat
    pullPolicy: Always
    tag: "backend-changedetection"

  s3Bucket: satellite-images

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Data Science Pipelines configuration
pipelines:
  enabled: true
  name: dspa

  apiServer:
    enableOauth: true
    cacheEnabled: true
    artifactSignedURLExpirySeconds: 60

  database:
    pipelineDBName: mlpipeline
    pvcSize: 10Gi
    username: mlpipeline

  persistenceAgent:
    numWorkers: 2

  podToPodTLS: true

  scheduledWorkflow:
    cronScheduleTimezone: UTC

  # Run analysis pipeline automatically after install
  runAnalysis: true

  analysis:
    image: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/s2i-generic-data-science-notebook:2024.1
    waitImage: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest
